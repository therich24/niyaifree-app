services:
  - type: web
    name: niyaifree-app
    runtime: node
    region: singapore
    plan: free
    buildCommand: pnpm install && pnpm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: JWT_SECRET
        value: niyaifree-secret-key-2026
